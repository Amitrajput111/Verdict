version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: verdict-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: verdict
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: verdict-redis
    ports:
      - '6379:6379'
    restart: always

volumes:
  pgdata:
